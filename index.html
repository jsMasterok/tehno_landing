<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link href="/dist/output.css" rel="stylesheet" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100;0,300;0,400;0,500;0,700;0,900;1,100;1,300;1,400;1,500;1,700;1,900&display=swap"
      rel="stylesheet"
    />
    <script src="./src/root.js"></script>
  </head>
  <body class="font-Roboto">
    <main class="w-full flex flex-col">
      <!-- HERO -->
      <section class="w-full hero-bg">
        <header class="w-full">
          <!-- Wrapper -->
          <div
            class="flex items-center justify-between px-4 w-full max-w-7xl py-4 mx-auto"
          >
            <!-- Logo -->
            <div class="border-2 border-red-500 p-2 w-24 text-center">LOGO</div>
            <!-- Other info -->
            <div class="w-fit flex items-center gap-x-10">
              <!-- Addres -->
              <div class="flex items-center gap-x-1 cursor-pointer">
                <!-- logo -->
                <svg
                  width="34"
                  height="34"
                  xmlns="http://www.w3.org/2000/svg"
                  width="16"
                  height="16"
                  fill="currentColor"
                  class="bi bi-geo-alt-fill"
                  viewBox="0 0 16 16"
                >
                  <path
                    d="M8 16s6-5.686 6-10A6 6 0 0 0 2 6c0 4.314 6 10 6 10m0-7a3 3 0 1 1 0-6 3 3 0 0 1 0 6"
                  />
                </svg>
                <span class="font-bold text-lg"> Київ,Польова 43 </span>
              </div>
              <!-- Telegram -->
              <a href="#" class="flex items-center gap-x-1">
                <!-- Logo -->
                <svg
                  width="34"
                  height="34"
                  id="Livello_1"
                  data-name="Livello 1"
                  xmlns="http://www.w3.org/2000/svg"
                  xmlns:xlink="http://www.w3.org/1999/xlink"
                  viewBox="0 0 240 240"
                >
                  <defs>
                    <linearGradient
                      id="linear-gradient"
                      x1="120"
                      y1="240"
                      x2="120"
                      gradientUnits="userSpaceOnUse"
                    >
                      <stop offset="0" stop-color="#1d93d2" />
                      <stop offset="1" stop-color="#38b0e3" />
                    </linearGradient>
                  </defs>
                  <title>Telegram_logo</title>
                  <circle
                    cx="120"
                    cy="120"
                    r="120"
                    fill="url(#linear-gradient)"
                  />
                  <path
                    d="M81.229,128.772l14.237,39.406s1.78,3.687,3.686,3.687,30.255-29.492,30.255-29.492l31.525-60.89L81.737,118.6Z"
                    fill="#c8daea"
                  />
                  <path
                    d="M100.106,138.878l-2.733,29.046s-1.144,8.9,7.754,0,17.415-15.763,17.415-15.763"
                    fill="#a9c6d8"
                  />
                  <path
                    d="M81.486,130.178,52.2,120.636s-3.5-1.42-2.373-4.64c.232-.664.7-1.229,2.1-2.2,6.489-4.523,120.106-45.36,120.106-45.36s3.208-1.081,5.1-.362a2.766,2.766,0,0,1,1.885,2.055,9.357,9.357,0,0,1,.254,2.585c-.009.752-.1,1.449-.169,2.542-.692,11.165-21.4,94.493-21.4,94.493s-1.239,4.876-5.678,5.043A8.13,8.13,0,0,1,146.1,172.5c-8.711-7.493-38.819-27.727-45.472-32.177a1.27,1.27,0,0,1-.546-.9c-.093-.469.417-1.05.417-1.05s52.426-46.6,53.821-51.492c.108-.379-.3-.566-.848-.4-3.482,1.281-63.844,39.4-70.506,43.607A3.21,3.21,0,0,1,81.486,130.178Z"
                    fill="#fff"
                  />
                </svg>
                <span class="font-bold text-lg"> +380 (XX)-XXX-XX-XX </span>
              </a>
              <!-- CallBack -->
              <div class="flex items-center gap-x-1 cursor-pointer">
                <svg
                  xmlns="http://www.w3.org/2000/svg"
                  width="24"
                  height="24"
                  fill="currentColor"
                  class="bi bi-telephone-fill"
                  viewBox="0 0 16 16"
                >
                  <path
                    fill-rule="evenodd"
                    d="M1.885.511a1.745 1.745 0 0 1 2.61.163L6.29 2.98c.329.423.445.974.315 1.494l-.547 2.19a.678.678 0 0 0 .178.643l2.457 2.457a.678.678 0 0 0 .644.178l2.189-.547a1.745 1.745 0 0 1 1.494.315l2.306 1.794c.829.645.905 1.87.163 2.611l-1.034 1.034c-.74.74-1.846 1.065-2.877.702a18.634 18.634 0 0 1-7.01-4.42 18.634 18.634 0 0 1-4.42-7.009c-.362-1.03-.037-2.137.703-2.877L1.885.511z"
                  />
                </svg>
                <span class="font-bold text-lg"> Зателефонуйте мені </span>
              </div>
            </div>
          </div>
        </header>
        <!-- Wrapper -->
        <div class="w-full max-w-7xl mx-auto p-4 flex flex-col gap-y-2">
          <div class="w-full grid grid-cols-12 gap-x-2 mt-10">
            <!-- LEFT -->
            <div class="col-span-6 flex flex-col gap-y-1">
              <h2 class="font-bold text-3xl">Швидкий викуп вашої техніки</h2>
              <span class="text-sm font-bold">Хочете щось продати?</span>
              <span class="text-base font-bold mt-2"
                >Заповніть форму,і ми з вами зв'яжемось</span
              >
              <!-- FOM -->
              <form
                action="#"
                method="#"
                class="w-full grid grid-cols-12 gap-2 mt-2"
              >
                <div class="col-span-6 w-full">
                  <input
                    type="text"
                    class="form-input w-full rounded shadow-md border-0"
                    name="name"
                    placeholder="Ім'я"
                  />
                </div>
                <div class="col-span-6 w-full">
                  <input
                    type="tel"
                    name="tel"
                    class="form-input w-full rounded shadow-md border-0"
                    placeholder="Телефон"
                  />
                </div>
                <div class="col-span-12">
                  <textarea
                    name="description"
                    placeholder="Короткий опис товару"
                    class="form-textarea w-full rounded shadow-md border-0"
                  ></textarea>
                </div>
                <button
                  type="submit"
                  class="w-full col-span-12 rounded text-center text-white bg-blue-500 py-3 shadow-sm hover:shadow-xl transition-all"
                >
                  Дізнатись ціну
                </button>
              </form>
            </div>
          </div>
          <!-- Benefits -->
          <div class="flex items-center justify-between gap-x-2">
            <div class="flex items-center gap-x-1">
              <svg
                xmlns="http://www.w3.org/2000/svg"
                width="32"
                height="32"
                fill="currentColor"
                class="bi bi-percent"
                viewBox="0 0 16 16"
              >
                <path
                  d="M13.442 2.558a.625.625 0 0 1 0 .884l-10 10a.625.625 0 1 1-.884-.884l10-10a.625.625 0 0 1 .884 0M4.5 6a1.5 1.5 0 1 1 0-3 1.5 1.5 0 0 1 0 3m0 1a2.5 2.5 0 1 0 0-5 2.5 2.5 0 0 0 0 5m7 6a1.5 1.5 0 1 1 0-3 1.5 1.5 0 0 1 0 3m0 1a2.5 2.5 0 1 0 0-5 2.5 2.5 0 0 0 0 5"
                />
              </svg>
              <div class="flex flex-col">
                <span>Конкурентні ціни</span>
                <span>Вигідні пропозиції</span>
              </div>
            </div>
          </div>
        </div>
      </section>
    </main>
  </body>
</html>
